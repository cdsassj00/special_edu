function loop(){
  requestAnimationFrame(loop);

  var p=max>0?clamp(scrollY_/max,0,1):0;
  pS+=(p-pS)*(REDUCE?1:.08);
  var sa=sentAt(pS);
  cur=OFFS[sa.ch]+sa.ci;

  /* 카메라: 곡선 주행 + 뱅킹 + 트래블 FOV 킥 */
  var u=clamp(pS*.985+.002,0,.985);
  var pos=curve.getPointAt(u);
  var look=curve.getPointAt(clamp(u+.016,0,1));
  var tan=curve.getTangentAt(u);
  var right=new T.Vector3().crossVectors(tan,up0).normalize();
  var upv=new T.Vector3().crossVectors(right,tan).normalize();
  mouse.sx=lerp(mouse.sx,mouse.x,.06);mouse.sy=lerp(mouse.sy,mouse.y,.06);
  pos.add(right.clone().multiplyScalar(mouse.sx*2.2)).add(upv.clone().multiplyScalar(-mouse.sy*1.6));
  if(shakeT>.01){pos.x+=(Math.random()-.5)*shakeT*.9;pos.y+=(Math.random()-.5)*shakeT*.9;}
  camera.position.copy(pos);
  camera.lookAt(look);
  var tan2=curve.getTangentAt(clamp(u+.03,0,1));
  if(!REDUCE)camera.rotateZ(clamp((tan2.x-tan.x)*2.2,-.16,.16)+mouse.sx*.04);

  camera.fov=70+travel*9;camera.updateProjectionMatrix();

  tunUni.uT.value=time;

  /* 무임승차 슬램 */
  if(cur===26&&curPrev!==26&&!REDUCE)shakeT=1;
  curPrev=cur;
  shakeT*=.93;
  $('#flash').style.opacity=(shakeT*.5).toFixed(3);

  /* 패널 활성화: 슬램 인 + 지난 것 딤 */
  var now=performance.now();
  items.forEach(function(it){
    var on=it.g<=cur, isCur=it.g===cur;
    var ud=it.obj.userData;
    ud.a=lerp(ud.a||0,on?1:0,.11);
    var s=Math.max(.001,(it.kind==='group'?1:1)*(ud.a<.999?outBack(ud.a):1));
    it.obj.scale.setScalar(s);
    var op=on?(isCur?1:.24):0;

    op*=clamp((dCam-4.5)/5,0,1);
    it.obj.traverse(function(nn){
      if(nn.material&&nn.material.opacity!==undefined){
        if(nn.userData._bo===undefined)nn.userData._bo=nn.material.opacity||1;
        nn.material.transparent=true;
        nn.material.opacity=lerp(nn.material.opacity,nn.userData._bo*op,.12);
      }});
    if(isCur&&!REDUCE)it.obj.position.y+=Math.sin(time*1.6)*.004;
  });

  /* 스페셜 애니메이션 */
  if(specials.counters4)specials.counters4.traverse(function(nn){if(nn.userData.tick)nn.userData.tick(cur>=2,now);});
  if(specials.counters3)specials.counters3.traverse(function(nn){if(nn.userData.tick)nn.userData.tick(cur>=8,now);});
  if(specials.counter300)specials.counter300.traverse(function(nn){if(nn.userData.tick)nn.userData.tick(cur>=21,now);});
  if(specials.swarm){
    var m2=sa.ch===4?clamp(sa.sp*2.4-1,0,1):(sa.ch>4?1:0);
    var e2=ease(m2);
    specials.swarm.updateMatrixWorld();
    specials.swarm.userData.dots.forEach(function(s3,i4){
      s3.position.lerpVectors(s3.userData.A,s3.userData.B,e2);
      var wp=_tmpV.copy(s3.position).applyMatrix4(specials.swarm.matrixWorld);
      var nf=clamp((camera.position.distanceTo(wp)-3)/4,0,1);
      if(!s3.userData.win){s3.material.opacity=(.95-e2*.85)*nf;s3.scale.setScalar(1-e2*.7);}
      else{s3.material.opacity=nf;s3.scale.setScalar(1+e2*1.3);}
      s3.position.y+=Math.sin(time*2+i4)*.02;
    });
  }
  if(specials.triangle&&!REDUCE)specials.triangle.rotation.y=Math.sin(time*.5)*.16;
  if(specials.flowmap)specials.flowmap.lookAt(camera.position);
  if(specials.podium){
    var pb=cur>=29?1:0;
    specials.podium.userData.bars.forEach(function(bar,bi){
      bar.userData.hh=lerp(bar.userData.hh||.001,pb?bar.userData.h:.001,.09);
      bar.scale.y=bar.userData.hh;
      bar.position.y=-4+bar.userData.hh/2;
    });
  }

  /* HUD */
  $('#progress').style.width=(pS*100).toFixed(2)+'%';
  if(sa.ch!==lastCh){lastCh=sa.ch;
    $('#hud .hk').textContent=CHM[sa.ch].k;
    $('#hud .ht').textContent=CHM[sa.ch].t;
    dotEls.forEach(function(el,i5){el.className=i5===sa.ch?'on':'';});}
  if(cur!==lastCap){lastCap=cur;
    capEl.classList.add('fade');
    (function(cc){setTimeout(function(){
      capEl.textContent=CAPS[cc];capNo.textContent=cc+1;capEl.classList.remove('fade');},180);})(cur);}

  composer.render();
}

/* ═══ 나레이션 플레이어 (내장 mp3 · 스크럽 추적) ═══ */
/*AUDIO_EMBED_START*/var AUDIO_DATA={};/*AUDIO_EMBED_END*/
var engaged=false,wT=0;
var ACtx=null,BUFS={},BUFQ={};
function ensureCtx(){
  if(!ACtx){var AC=window.AudioContext||window.webkitAudioContext;if(AC)ACtx=new AC();}
  if(ACtx&&ACtx.state==='suspended')ACtx.resume();
}
function rawBuf(i){
  var src=AUDIO_DATA[String(i)];
  if(src){var b64=src.split(',')[1],bin=atob(b64),u8=new Uint8Array(bin.length);
    for(var k2=0;k2<bin.length;k2++)u8[k2]=bin.charCodeAt(k2);
    return Promise.resolve(u8.buffer);}
  return fetch('audio/pt-'+i+'.mp3').then(function(r){return r.arrayBuffer();});
}
function loadBuf(i){
  if(!ACtx||i<0||i>=TOTAL)return Promise.resolve(null);
  if(BUFS[i])return Promise.resolve(BUFS[i]);
  if(BUFQ[i])return BUFQ[i];
  BUFQ[i]=rawBuf(i).then(function(ab){
    return new Promise(function(res){ACtx.decodeAudioData(ab,function(bf){BUFS[i]=bf;res(bf);},function(){res(null);});});
  }).catch(function(){return null;});
  return BUFQ[i];
}
var P={on:false,idx:0,gen:0,audio:null,t0:0,dur:0,fromY:0,toY:0,timer:0,raf:0};
function targetY(g){return pOf(g)*(document.documentElement.scrollHeight-innerHeight);}
P.line=function(){
  var self=this,g=++this.gen,i=this.idx;
  if(i>=TOTAL){this.finish();return;}
  this.fromY=scrollY;this.toY=targetY(i);
  this.dur=Math.max(2600,CAPS[i].length*150);this.t0=performance.now();
  var spoken=false;
  var done=function(){
    if(spoken||g!==self.gen)return;
    var remain=self.t0+self.dur-performance.now();
    if(remain>150){clearTimeout(self.timer);self.timer=setTimeout(done,remain);return;}
    spoken=true;setTimeout(function(){if(!P.on||g!==P.gen)return;P.idx++;P.line();},900);
  };
  loadBuf(i).then(function(bf){
    if(g!==self.gen)return;
    if(bf&&ACtx){
      var srcN=ACtx.createBufferSource();srcN.buffer=bf;srcN.connect(ACtx.destination);
      srcN.onended=function(){if(g===self.gen)done();};
      self.dur=Math.max(1500,bf.duration*1000);self.t0=performance.now();
      clearTimeout(self.timer);self.timer=setTimeout(done,self.dur+3000);
      try{srcN.start();}catch(_){}
      self.audio=srcN;
    }else{clearTimeout(self.timer);self.timer=setTimeout(done,self.dur);}
    loadBuf(i+1);loadBuf(i+2); /* 다음 문장 미리 디코딩 */
  });
  clearTimeout(this.timer);this.timer=setTimeout(done,this.dur+6000);
  (function tick(){
    if(!P.on||g!==P.gen)return;
    var ad=Math.min(P.dur*.45,3600);
    var pr=clamp((performance.now()-P.t0)/ad,0,1);
    var e3=pr<.5?2*pr*pr:1-Math.pow(-2*pr+2,2)/2;
    scrollTo(0,P.fromY+(P.toY-P.fromY)*e3);
    P.raf=requestAnimationFrame(tick);})();
};
P.start=function(from){engaged=true;ensureCtx();loadBuf(from||0);this.stopAudio();this.on=true;this.idx=from||0;this.gen++;
  $('#npStart').classList.add('off');$('#npCtl').classList.add('on');
  $('#npBtn').textContent='⏸ 일시정지';this.line();};
P.pause=function(){engaged=false;this.on=false;this.gen++;this.stopAudio();
  cancelAnimationFrame(this.raf);clearTimeout(this.timer);
  $('#npBtn').textContent='▶ 이어보기';};
P.resume=function(){var y=scrollY,best=0,bd=1e18;
  for(var i=0;i<TOTAL;i++){var d3=Math.abs(targetY(i)-y);if(d3<bd){bd=d3;best=i;}}
  this.start(best);};
P.stopAudio=function(){if(this.audio){try{this.audio.stop?this.audio.stop():this.audio.pause();}catch(_){}this.audio=null;}};
P.finish=function(){engaged=false;this.on=false;this.gen++;this.stopAudio();
  $('#npBtn').textContent='↺ 다시보기';};
$('#npStart').addEventListener('click',function(){P.start(0);});
$('#npBtn').addEventListener('click',function(){
  if(P.on)P.pause();else if(P.idx>=TOTAL)P.start(0);else P.resume();});
['wheel','touchmove'].forEach(function(ev){
  addEventListener(ev,function(){
    if(!engaged)return;
    if(P.on){P.on=false;P.gen++;P.stopAudio();cancelAnimationFrame(P.raf);clearTimeout(P.timer);
      $('#npBtn').textContent='↕ 위치 이동 중…';}
    clearTimeout(wT);
    wT=setTimeout(function(){if(engaged&&!P.on){$('#npBtn').textContent='⏸ 일시정지';P.resume();}},650);
  },{passive:true});});
addEventListener('keydown',function(e){
  if(e.code!=='Space')return;e.preventDefault();
  if(P.on)P.pause();else if($('#npStart').classList.contains('off'))P.resume();else P.start(0);});

/* ═══ 부트 ═══ */
var booted=false;
function boot(){
  if(booted)return;booted=true;
  try{buildWorld();}catch(e){console.error('[v3] build fail',e);}
  setTimeout(function(){$('#loader').classList.add('done');},300);
  scrollY_=scrollY;loop();
}
if(document.fonts&&document.fonts.load){
  Promise.all(['400','700','800'].map(function(w){
    return document.fonts.load(w+" 40px 'Pretendard Variable'",'전문인재Aa08월');
  })).then(boot).catch(boot);
}else boot();
setTimeout(boot,3000);
})();
</script>
