function F0(i){if(i>=TRN){var c=i-TRN;return[(c-2)*4,-5.5];}
  var g=i<19?0:1,a=i%19,col=a%5,row=(a/5)|0;
  return[(g?9:-9)+(col-2)*2.3,4+row*2.5];}
function F1(i){if(i>=TRN){var c=i-TRN;return[c<3?-20:20,14+(c%3)*7];}
  var col=i%8,row=(i/8)|0;return[(col-3.5)*4.5,12+row*4.8];}
function F2(i){if(i>=TRN){var c=i-TRN;return[(c-2)*4.6,26];}
  var col=i%6,row=(i/6)|0,w=16-row*1.1;return[(col/5-.5)*w,30+row*2.4];}
function F3(i){if(i>=TRN){var c=i-TRN;return[BX[c]+2.6,80];}
  if(isSel(i)){var j=SELECTED.indexOf(i);return[BX[j],81];}
  var k=0,m=0,cnt=0;
  for(var q=0;q<TRN;q++){if(isSel(q))continue;if(q===i){k=(cnt/4)|0;m=cnt%4;break;}cnt++;}
  var tx=(k%5-2)*9.5,tz=64+((k/5)|0)*7,a2=m*Math.PI/2+k*.7;
  return[tx+Math.cos(a2)*1.8,tz+Math.sin(a2)*1.8];}
function F4(i){ /* 시상식: 포디움+관중 */
  if(i>=TRN){var c=i-TRN;return[POD.x-9+(c*1.1-2),POD.z-2+(c%2)];}
  var wi=W3.indexOf(i);
  if(wi>-1)return[POD.x+[0,-2.9,2.9][wi],POD.z];
  var m2=0,cnt2=0;
  for(var q2=0;q2<TRN;q2++){if(W3.indexOf(q2)>-1)continue;if(q2===i){m2=cnt2;break;}cnt2++;}
  return[POD.x+((m2%9)-4)*2.2,POD.z-6-((m2/9)|0)*2.3];}
var FORMS=[F0,F1,F2,F3,F4];

function personPos(i,t){
  var s=clamp(Math.floor(t),0,N-1),u=clamp(t-s,0,1);

(function loadHumans(){
  try{
    if(typeof SOLDIER_B64==='undefined'||!T.GLTFLoader)throw new Error('no glb');
    var bin=atob(SOLDIER_B64);
    var buf=new ArrayBuffer(bin.length),u8=new Uint8Array(buf);
    for(var i6=0;i6<bin.length;i6++)u8[i6]=bin.charCodeAt(i6);
    new T.GLTFLoader().parse(buf,'',function(g){
      var clips=g.animations;
      var idleC=T.AnimationClip.findByName(clips,'Idle')||clips[0];
      var walkC=T.AnimationClip.findByName(clips,'Walk')||clips[1]||clips[0];
      for(var i7=0;i7<ALLN;i7++){
        var gold=i7>=TRN;
        var grp=T.SkeletonUtils.clone(g.scene);
        var tint=new T.Color(gold?COL_GOLD:(i7<19?COL_A:COL_B));
        var mats=[];
        grp.traverse(function(nn){if(nn.isMesh){
          nn.castShadow=true;nn.frustumCulled=false;
          nn.material=nn.material.clone();
          nn.material.color.multiply(tint);
          if(gold){nn.material.emissive=new T.Color(0x5c400e);nn.material.emissiveIntensity=.5;}
          mats.push(nn.material);
        }});
        grp.scale.setScalar((gold?1.03:.95)+((i7*53)%7)*.012);
        var mixer=new T.AnimationMixer(grp);
        var idle=mixer.clipAction(idleC),walk=mixer.clipAction(walkC);
        idle.play();walk.play();walk.weight=0;
        mixer.update(((i7*37)%20)*.1);
        scene.add(grp);
        people[i7]={kind:'glb',grp:grp,yaw:Math.PI,off:Math.PI,mixer:mixer,idle:idle,walk:walk,wW:0,mats:mats,
                    base:mats.map(function(m3){return m3.color.clone();})};
      }
    },function(err){console.warn('glb fail',err);buildCapsuleCrowd();});
  }catch(e){console.warn(e);buildCapsuleCrowd();}
})();

  el.addEventListener('click',function(){scrollTo({top:i8*secPx()+10,behavior:'smooth'});});
  dotsNav.appendChild(el);})(d3);}
var dotEls=[].slice.call(dotsNav.children);
var capEl=$('#caption .ctx'),capNo=$('#caption .cno');
var _v1=new T.Vector3();

function loop(){
  requestAnimationFrame(loop);
  time+=1/60;
  var max=document.documentElement.scrollHeight-innerHeight;
  var p=max>0?clamp(scrollY_/max,0,1):0;
  pS+=(p-pS)*(REDUCE?1:.075);
  var sa=sentAt(pS);
  cur=OFFS[sa.ch]+sa.ci;
  var t=pS*N;

  /* 카메라: 문장 앵커 + 문장 내 오빗 */
  var A=CAMS[cur];
  var lk=new T.Vector3(A.l[0],A.l[1],A.l[2]);
  var ey=new T.Vector3(A.e[0],A.e[1],A.e[2]);
  if(A.orb&&!REDUCE){
    var ang=(sa.frac-.5)*A.orb*Math.PI/180;
    var off=ey.clone().sub(lk);
    off.applyAxisAngle(new T.Vector3(0,1,0),ang);
    ey=lk.clone().add(off);
  }
  camPos.lerp(ey,REDUCE?1:.055);
  camLook.lerp(lk,REDUCE?1:.075);
  mouse.sx=lerp(mouse.sx,mouse.x,.06);mouse.sy=lerp(mouse.sy,mouse.y,.06);
  camera.position.copy(camPos);
  if(shakeT>.01){camera.position.x+=(Math.random()-.5)*shakeT*.5;camera.position.y+=(Math.random()-.5)*shakeT*.4;}
  camera.lookAt(camLook.x+mouse.sx*1.6,camLook.y-mouse.sy*1.1,camLook.z);

  /* 타임라인 팩터 (t = p*9) */
  var sparkF=smooth(clamp((t-3.15)/.4,0,1))*(1-smooth(clamp((t-4.05)/.3,0,1)));
  var gateGlow=smooth(clamp((t-4.0)/.35,0,1))*(1-smooth(clamp((t-5.0)/.4,0,1)));
  var lit=smooth(clamp((t-4.5)/.35,0,1));
  var selGlow=smooth(clamp((t-4.55)/.4,0,1));
  var beam=smooth(clamp((t-5.3)/.3,0,1));
  var teamsVis=smooth(clamp((t-5.1)/.3,0,1));
  var podF=smooth(clamp((t-7.03)/.3,0,1));

  /* 무임승차 슬램 */
  if(cur===26&&curPrev!==26&&!REDUCE)shakeT=1;
  curPrev=cur;shakeT*=.93;
  $('#flash').style.opacity=(shakeT*.45).toFixed(3);

  /* 인물 */
  for(var i9=0;i9<ALLN;i9++){
    var P2=people[i9];if(!P2)continue;
    var pp=personPos(i9,t);
    P2.grp.position.set(pp.x,0,pp.z);
    /* 시상식: 수상자 3인 포디움 위 */
    if(t>=7&&W3.indexOf(i9)>-1&&!pp.moving){
      var wi2=W3.indexOf(i9);
      P2.grp.position.y=podBars[wi2].userData.h*podF;
    }
    var ty;
    if(pp.moving&&(pp.dx||pp.dz))ty=Math.atan2(pp.dx,pp.dz);
    else ty=Math.atan2(camera.position.x-pp.x,camera.position.z-pp.z);
    var dd=ty-P2.yaw;dd=Math.atan2(Math.sin(dd),Math.cos(dd));
    P2.yaw+=dd*.12;P2.grp.rotation.y=P2.yaw+P2.off;
    var w=pp.moving?1:0;
    if(P2.kind==='glb'){
      P2.wW+=(w-P2.wW)*.1;
      P2.walk.weight=P2.wW;P2.idle.weight=1-P2.wW;
      P2.mixer.update(1/60);
      if(i9<TRN&&isSel(i9)&&selGlow>0)
        P2.mats.forEach(function(m4,q4){m4.color.lerpColors(P2.base[q4],GOLDC,selGlow*.75);
          if(!m4.emissive.getHex())m4.emissive=new T.Color(0x5c400e);
          m4.emissiveIntensity=.4*selGlow;});
    }else{
      var ph=time*8.5+i9*1.7;
      P2.legL.rotation.x=Math.sin(ph)*.65*w;
      P2.legR.rotation.x=-Math.sin(ph)*.65*w;
      P2.armL.rotation.x=-Math.sin(ph)*.5*w;
      P2.armR.rotation.x=Math.sin(ph)*.5*w;
      if(!(t>=7&&W3.indexOf(i9)>-1))P2.grp.position.y=w?Math.abs(Math.sin(ph))*.07:0;
      if(i9<TRN&&isSel(i9)&&selGlow>0){
        P2.mat.color.lerpColors(new T.Color(i9<19?COL_A:COL_B),GOLDC,selGlow);
        P2.mat.emissive.setHex(0x6b4c12);P2.mat.emissiveIntensity=.4*selGlow;
      }
    }
  }

  /* 소품 애니 */
  var gv=smooth(clamp((t-3.85)/.3,0,1));
  gateGrp.visible=gv>.02;
  gateGrp.userData.pm.opacity=gv;
  gateGrp.userData.pm.emissiveIntensity=.22+gateGlow*.8;
  gateGrp.userData.banner.material.opacity=gv*(.3+.7*gateGlow);
  scanner.visible=gateGlow>.02;
  scanner.material.opacity=gateGlow*.8;
  scanner.position.x=Math.sin(time*2.4)*5.4;
  builds.forEach(function(mm,j5){mm.emissiveIntensity=.04+lit*1.3;});
  warm.intensity=lit*1.6;
  labOrg.material.opacity=lit*.9;
  var passZ=-8+pS*95;
  pathDots.forEach(function(d4){
    var passed=d4.position.z<passZ;
    d4.material.color.setHex(passed?0xe8c268:0x8ba3cd);
    d4.material.opacity=(passed?.9:.4)*clamp((d4.position.distanceTo(camera.position)-3)/4,0,1);
  });
  teamDiscs.forEach(function(d5){d5.material.opacity=teamsVis;});
  labTeam.material.opacity=teamsVis*(t>5.5&&t<7?.9:0);
  podBars.forEach(function(bar){
    bar.scale.y=Math.max(.001,bar.userData.h*podF);
    bar.position.y=bar.scale.y/2;
    bar.material.opacity=podF;
    bar.userData.lb.material.opacity=podF;
  });
  var l0=1-smooth(clamp((t-.85)/.25,0,1));
  lab1.material.opacity=l0;lab2.material.opacity=l0;
  for(var i10=0;i10<TRN;i10++){
    var pp2=personPos(i10,t);
    var sk=sparks[i10];
    sk.position.set(pp2.x,2.1+sparkF*1.1+Math.sin(time*2+i10*1.3)*.25,pp2.z);
    sk.material.opacity=sparkF*.95;
  }
  orbs.forEach(function(ob){
    var kf=(time*.35+ob.q/3)%1;
    ob.o.position.set(lerp(BX[ob.j]+2.6,BX[ob.j],kf),lerp(1.5,BH[ob.j]*.6,kf),lerp(80,BZ-3.4,kf));
    ob.o.material.opacity=beam*(1-Math.abs(kf-.5)*1.2)*.95;
  });

  /* 카드: 현재 문장만 표시 */
  Object.keys(cardObjs).forEach(function(k3){
    var sp4=cardObjs[k3];
    var on=(+k3)===cur;
    sp4.material.opacity=lerp(sp4.material.opacity,on?1:0,.12);
    if(on&&!REDUCE)sp4.position.y=CARDS[k3].p[1]+Math.sin(time*1.4)*.06;
  });

  /* HUD */
  $('#progress').style.width=(pS*100).toFixed(2)+'%';
  if(sa.ch!==lastCh){lastCh=sa.ch;
    $('#hud .hk').textContent=CHM[sa.ch].k;
    $('#hud .ht').textContent=CHM[sa.ch].t;
    dotEls.forEach(function(el,i11){el.className=i11===sa.ch?'on':'';});}
  if(cur!==lastCap){lastCap=cur;
    capEl.classList.add('fade');
    (function(cc){setTimeout(function(){
      capEl.textContent=CAPS[cc];capNo.textContent=cc+1;capEl.classList.remove('fade');},180);})(cur);}

  renderer.render(scene,camera);
}

/* ═══ 나레이션 플레이어 (WebAudio · 스크럽 추적) ═══ */
/*AUDIO_EMBED_START*/var AUDIO_DATA={};/*AUDIO_EMBED_END*/
var engaged=false,wT=0;
var ACtx=null,BUFS={},BUFQ={};
function ensureCtx(){
  if(!ACtx){var AC=window.AudioContext||window.webkitAudioContext;if(AC)ACtx=new AC();}
  if(ACtx&&ACtx.state==='suspended')ACtx.resume();
}
function rawBuf(i){
  var src=AUDIO_DATA[String(i)];
  if(src){var b64=src.split(',')[1],bin=atob(b64),u8=new Uint8Array(bin.length);
    for(var k4=0;k4<bin.length;k4++)u8[k4]=bin.charCodeAt(k4);
    return Promise.resolve(u8.buffer);}
  return fetch('audio/pt-'+i+'.mp3').then(function(r){return r.arrayBuffer();});
}
function loadBuf(i){
  if(!ACtx||i<0||i>=TOTAL)return Promise.resolve(null);
  if(BUFS[i])return Promise.resolve(BUFS[i]);
  if(BUFQ[i])return BUFQ[i];
  BUFQ[i]=rawBuf(i).then(function(ab){
    return new Promise(function(res){ACtx.decodeAudioData(ab,function(bf){BUFS[i]=bf;res(bf);},function(){res(null);});});
  }).catch(function(){return null;});
  return BUFQ[i];
}
var P={on:false,idx:0,gen:0,audio:null,t0:0,dur:0,fromY:0,toY:0,timer:0,raf:0};
function targetY(g){return pOf(g)*(document.documentElement.scrollHeight-innerHeight);}
P.line=function(){
  var self=this,g=++this.gen,i=this.idx;
  if(i>=TOTAL){this.finish();return;}
  this.fromY=scrollY;this.toY=targetY(i);
  this.dur=Math.max(2600,CAPS[i].length*150);this.t0=performance.now();
  var spoken=false;
  var done=function(){
    if(spoken||g!==self.gen)return;
    var remain=self.t0+self.dur-performance.now();
    if(remain>150){clearTimeout(self.timer);self.timer=setTimeout(done,remain);return;}
    spoken=true;setTimeout(function(){if(!P.on||g!==P.gen)return;P.idx++;P.line();},900);
  };
  loadBuf(i).then(function(bf){
    if(g!==self.gen)return;
    if(bf&&ACtx){
      var srcN=ACtx.createBufferSource();srcN.buffer=bf;srcN.connect(ACtx.destination);
      srcN.onended=function(){if(g===self.gen)done();};
      self.dur=Math.max(1500,bf.duration*1000);self.t0=performance.now();
      clearTimeout(self.timer);self.timer=setTimeout(done,self.dur+3000);
      try{srcN.start();}catch(_){}
      self.audio=srcN;
    }else{clearTimeout(self.timer);self.timer=setTimeout(done,self.dur);}
    loadBuf(i+1);loadBuf(i+2);
  });
  clearTimeout(this.timer);this.timer=setTimeout(done,this.dur+6000);
  (function tick(){
    if(!P.on||g!==P.gen)return;
    var ad=Math.min(P.dur*.45,3600);
    var pr=clamp((performance.now()-P.t0)/ad,0,1);
    var e3=pr<.5?2*pr*pr:1-Math.pow(-2*pr+2,2)/2;
    scrollTo(0,P.fromY+(P.toY-P.fromY)*e3);
    P.raf=requestAnimationFrame(tick);})();
};
P.start=function(from){engaged=true;ensureCtx();loadBuf(from||0);this.stopAudio();this.on=true;this.idx=from||0;this.gen++;
  $('#npStart').classList.add('off');$('#npCtl').classList.add('on');
  $('#npBtn').textContent='⏸ 일시정지';this.line();};
P.pause=function(){engaged=false;this.on=false;this.gen++;this.stopAudio();
  cancelAnimationFrame(this.raf);clearTimeout(this.timer);
  $('#npBtn').textContent='▶ 이어보기';};
P.resume=function(){var y=scrollY,best=0,bd=1e18;
  for(var i=0;i<TOTAL;i++){var d6=Math.abs(targetY(i)-y);if(d6<bd){bd=d6;best=i;}}
  this.start(best);};
P.stopAudio=function(){if(this.audio){try{this.audio.stop?this.audio.stop():this.audio.pause();}catch(_){}this.audio=null;}};
P.finish=function(){engaged=false;this.on=false;this.gen++;this.stopAudio();
  $('#npBtn').textContent='↺ 다시보기';};
$('#npStart').addEventListener('click',function(){P.start(0);});
$('#npBtn').addEventListener('click',function(){
  if(P.on)P.pause();else if(P.idx>=TOTAL)P.start(0);else P.resume();});
['wheel','touchmove'].forEach(function(ev){
  addEventListener(ev,function(){
    if(!engaged)return;
    if(P.on){P.on=false;P.gen++;P.stopAudio();cancelAnimationFrame(P.raf);clearTimeout(P.timer);
      $('#npBtn').textContent='↕ 위치 이동 중…';}
    clearTimeout(wT);
    wT=setTimeout(function(){if(engaged&&!P.on){$('#npBtn').textContent='⏸ 일시정지';P.resume();}},650);
  },{passive:true});});
addEventListener('keydown',function(e){
  if(e.code!=='Space')return;e.preventDefault();
  if(P.on)P.pause();else if($('#npStart').classList.contains('off'))P.resume();else P.start(0);});

/* ═══ 부트 ═══ */
var booted=false;
function boot(){
  if(booted)return;booted=true;
  setTimeout(function(){$('#loader').classList.add('done');},400);
  scrollY_=scrollY;loop();
}
if(document.fonts&&document.fonts.load){
  Promise.all(['400','700','800'].map(function(w){
    return document.fonts.load(w+" 40px 'Pretendard Variable'",'전문인재Aa08월');
  })).then(boot).catch(boot);
}else boot();
setTimeout(boot,3000);
})();
